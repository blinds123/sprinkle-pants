name: Finn Loop CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Finn Loop contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate repository contracts
        run: python3 scripts/validate_repository.py --root .
