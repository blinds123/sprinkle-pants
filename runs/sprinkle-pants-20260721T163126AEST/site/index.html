<!doctype html>
<html lang="en" data-layout-contract="goda-webinar-15-proof-4-v3">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="color-scheme" content="light">
  <title>Sprinkle Tweed Pants + Auralo Pheromone Perfume</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="announcement" id="announcement" data-section="announcement"></div>
  <header class="site-header" data-section="header">
    <a class="brand" href="#top" aria-label="Auralo Pheromone Perfume home">Auralo Pheromone Perfume</a>
    <a class="header-cta" id="header-cta" href="#final-offer"></a>
  </header>

  <main id="top">
    <section class="hero section" data-section="hero" data-module="hero-offer" aria-labelledby="hero-heading">
      <div class="hero-shell">
        <header class="hero-heading">
          <p class="eyebrow" id="eyebrow"></p>
          <h1 id="hero-heading"></h1>
          <p class="hero-sub" id="hero-subheadline"></p>
        </header>

        <div class="hero-layout">
          <div class="hero-media" role="region" aria-label="15-image offer gallery" tabindex="0" data-gallery>
            <div class="hero-track" id="hero-track" data-hero-carousel="15"></div>
            <div class="carousel-toolbar hero-toolbar">
              <button class="carousel-button" id="hero-previous" type="button" aria-label="Previous offer image">←</button>
              <output class="hero-counter" id="hero-counter" aria-live="polite">1 / 15</output>
              <button class="carousel-button" id="hero-next" type="button" aria-label="Next offer image">→</button>
            </div>
            <div class="hero-thumbs" id="hero-thumbs" aria-label="Choose an offer image"></div>
          </div>

          <aside class="buybox" aria-labelledby="hero-offer-heading">
            <p class="buybox-label">The complete offer</p>
            <h2 id="hero-offer-heading"></h2>
            <p id="hero-offer-body"></p>
            <button class="primary-cta" data-preview-checkout type="button"></button>
            <a class="text-link" id="secondary-cta" href="#faq"></a>
            <ul class="trust-strip" id="trust-strip"></ul>
          </aside>
        </div>
      </div>
    </section>

    <section class="proof-section proof-band proof-band--cream" data-section="social" data-module="testimonial-one" aria-labelledby="social-heading">
      <div class="section-intro centered">
        <p class="kicker" id="social-kicker"></p>
        <h2 id="social-heading"></h2>
      </div>
      <div class="rail-shell">
        <div class="testimonial-rail" id="testimonial-rail-one" data-testimonial-zone="1"></div>
        <div class="carousel-toolbar rail-toolbar">
          <button class="carousel-button" type="button" data-rail-previous="testimonial-rail-one" aria-label="Previous customer story">←</button>
          <button class="carousel-button" type="button" data-rail-next="testimonial-rail-one" aria-label="Next customer story">→</button>
        </div>
      </div>
    </section>

    <section class="section faq" id="faq" data-section="faq" data-module="faq" aria-labelledby="faq-heading">
      <div class="section-intro">
        <h2 id="faq-heading"></h2>
      </div>
      <div id="faq-list"></div>
    </section>

    <section class="proof-section proof-band proof-band--wine" data-section="recognition" data-module="testimonial-two" aria-labelledby="recognition-heading">
      <div class="section-intro centered light-copy">
        <p class="kicker" id="recognition-kicker"></p>
        <h2 id="recognition-heading"></h2>
        <p id="recognition-body"></p>
      </div>
      <div class="rail-shell">
        <div class="testimonial-rail" id="testimonial-rail-two" data-testimonial-zone="2"></div>
        <div class="carousel-toolbar rail-toolbar">
          <button class="carousel-button" type="button" data-rail-previous="testimonial-rail-two" aria-label="Previous recognition story">←</button>
          <button class="carousel-button" type="button" data-rail-next="testimonial-rail-two" aria-label="Next recognition story">→</button>
        </div>
      </div>
    </section>

    <section class="section offer-reveal" id="offer" data-section="offer" data-module="mid-offer" aria-labelledby="offer-heading">
      <div class="offer-copy">
        <p class="kicker">One order. Two products.</p>
        <h2 id="offer-heading"></h2>
        <p id="offer-body"></p>
        <ul class="offer-stack" id="offer-stack"></ul>
        <button class="primary-cta primary-cta--light" data-preview-checkout type="button"></button>
      </div>
    </section>

    <section class="proof-section proof-band proof-band--rose" data-section="compliments" data-module="testimonial-three" aria-labelledby="compliments-heading">
      <div class="section-intro centered light-copy">
        <p class="kicker" id="compliments-kicker"></p>
        <h2 id="compliments-heading"></h2>
      </div>
      <div class="rail-shell">
        <div class="testimonial-rail" id="testimonial-rail-three" data-testimonial-zone="3"></div>
        <div class="carousel-toolbar rail-toolbar">
          <button class="carousel-button" type="button" data-rail-previous="testimonial-rail-three" aria-label="Previous customer perspective">←</button>
          <button class="carousel-button" type="button" data-rail-next="testimonial-rail-three" aria-label="Next customer perspective">→</button>
        </div>
      </div>
    </section>

    <section class="proof-section proof-band proof-band--paper" data-section="review_wall" data-module="testimonial-four" aria-labelledby="wall-heading">
      <div class="section-intro centered">
        <p class="kicker" id="wall-kicker"></p>
        <h2 id="wall-heading"></h2>
        <p id="wall-body"></p>
      </div>
      <div class="rail-shell">
        <div class="testimonial-rail" id="testimonial-rail-four" data-testimonial-zone="4"></div>
        <div class="carousel-toolbar rail-toolbar">
          <button class="carousel-button" type="button" data-rail-previous="testimonial-rail-four" aria-label="Previous final customer story">←</button>
          <button class="carousel-button" type="button" data-rail-next="testimonial-rail-four" aria-label="Next final customer story">→</button>
        </div>
      </div>
    </section>

    <section class="section final-offer" id="final-offer" data-section="final_offer" data-module="final-checkout" aria-labelledby="final-heading">
      <div class="final-copy">
        <p class="kicker">Ready when you are</p>
        <h2 id="final-heading"></h2>
        <p id="final-body"></p>
        <div class="price-line" id="price-line"></div>
        <button class="primary-cta" data-preview-checkout type="button"></button>
      </div>
      <ul class="final-trust" id="final-trust"></ul>
    </section>
  </main>

  <div class="checkout-drawer" id="checkout-drawer" hidden>
    <button class="drawer-backdrop" data-close-checkout type="button" aria-label="Close checkout"></button>
    <section class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-heading">
      <button class="drawer-close" data-close-checkout type="button" aria-label="Close">×</button>
      <h2 id="drawer-heading"></h2>
      <p id="drawer-body"></p>
      <div class="drawer-offer" id="drawer-offer"></div>
      <button class="secondary-button" data-close-checkout type="button">Return to offer</button>
    </section>
  </div>

  <footer class="site-footer" data-section="footer">
    <p class="footer-brand">Auralo Pheromone Perfume</p>
    <p class="preview-disclosure">This client preview contains illustrative claims and sample customer stories.</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
